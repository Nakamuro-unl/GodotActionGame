name: Deploy Web Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.2
          use-dotnet: false
          include-templates: true

      - name: Import project
        run: godot --headless --import 2>&1 || true

      - name: Run tests
        run: |
          godot --headless -s addons/gdUnit4/bin/GdUnitCmdTool.gd \
            --ignoreHeadlessMode -a tests/ 2>&1 | tail -10
          echo "Tests completed"

      - name: Build Web export
        run: |
          mkdir -p builds/web
          godot --headless --export-release "Web" builds/web/index.html 2>&1

      - name: Verify build
        run: |
          ls -lh builds/web/
          test -f builds/web/index.html || exit 1

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.DEPLOY_KEY }}
          external_repository: Nakamuro-unl/mathmage-web
          publish_branch: master
          publish_dir: ./builds/web
          commit_message: "deploy: auto build from ${{ github.sha }}"
